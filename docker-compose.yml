services:
  socks:
    image: alpine:3.20
    container_name: ru-socks-tunnel
    restart: unless-stopped
    environment:
      SSH_ADDR: "${SSH_ADDR}"   # root@home.kiselev.cz
      SSH_PORT: "${SSH_PORT}"   # 902
    volumes:
      - type: bind
        source: ${SSH_KEY_PATH:-./ssh/id_ru_tunnel}
        target: /run/ssh/id_rsa_src
        read_only: true
        bind:
          create_host_path: false
    command:
      - sh
      - -lc
      - |
        set -eu &&
        apk add --no-cache openssh-client &&
        install -d -m 700 /root/.ssh &&
        if [ ! -f "/run/ssh/id_rsa_src" ]; then
          echo "SSH key source /run/ssh/id_rsa_src not found or is not a regular file." >&2
          echo "Set SSH_KEY_PATH to an existing private key file on the host." >&2
          exit 1
        fi &&
        install -m 600 /run/ssh/id_rsa_src /root/.ssh/id_rsa &&
        exec ssh -N \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=3 \
          -o ExitOnForwardFailure=yes \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -i /root/.ssh/id_rsa \
          -p ${SSH_PORT} \
          -D 0.0.0.0:9050 \
          ${SSH_ADDR}

  bot:
    image: python:3.11-slim
    container_name: yamusic-psychograph-bot
    restart: unless-stopped
    depends_on:
      - socks
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL: ${MODEL:-gpt-4o-mini}
      MAX_TRACKS: ${MAX_TRACKS:-120}
      YM_PROXY_HTTP: socks5h://socks:9050
      YM_PROXY_HTTPS: socks5h://socks:9050
      YM_TIMEOUT: ${YM_TIMEOUT:-15}
      YM_RETRIES: ${YM_RETRIES:-3}
      YM_BACKOFF: ${YM_BACKOFF:-0.5}
      SQLITE_PATH: /app/data/bot.sqlite3
      ADMIN_IDS: ${ADMIN_IDS}
    command:
      - bash
      - -lc
      - |
        pip install --no-cache-dir -r requirements.txt &&
        python bot.py
